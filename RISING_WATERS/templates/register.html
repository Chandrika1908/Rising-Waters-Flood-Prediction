<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<link rel="stylesheet"
href="{{ url_for('static',filename='main.css') }}">

</head>

<body>

<div class="container">

<div class="logo">🌊</div>

<h1>Create Account</h1>

<p>

Register to access the Flood Prediction System

</p>

<form method="POST">

<input

type="text"

name="name"

placeholder="👤 Full Name"

required>

<input

type="email"

name="email"

placeholder="📧 Email Address"

required>

<input

type="password"

name="password"

placeholder="🔒 Password"

required>

<select name="role">

<option>Meteorologist</option>

<option>Disaster Management Officer</option>

<option>Local Authority</option>

</select>

<button>

Register

</button>

</form>

<br>

<a href="/login">

<button>

Already have an account?

</button>

</a>

</div>

</body>

</html>
